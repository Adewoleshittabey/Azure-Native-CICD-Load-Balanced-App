name: CI/CD Pipeline

on:
  push:
    branches-ignore:
      - main

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run tests
        run: npm test

  build-and-push:
    name: Build and Push to ACR
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: devopsacrregistry.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: devopsacrregistry.azurecr.io/app:latest

  deploy:
    name: Deploy to Azure VMs
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Set up SSH keys
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VM1_SSH_KEY }}" > ~/.ssh/vm1_key
          echo "${{ secrets.VM2_SSH_KEY }}" > ~/.ssh/vm2_key
          chmod 600 ~/.ssh/vm1_key
          chmod 600 ~/.ssh/vm2_key
          ssh-keyscan -H ${{ secrets.VM1_HOST }} >> ~/.ssh/known_hosts
          ssh-keyscan -H ${{ secrets.VM2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy app1 to VM1
        run: |
          ssh -i ~/.ssh/vm1_key azureuser@${{ secrets.VM1_HOST }} << 'ENDSSH'
            docker login devopsacrregistry.azurecr.io \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}
            docker pull devopsacrregistry.azurecr.io/app:latest
            docker stop app1 || true
            docker rm app1 || true
            docker run -d \
              --name app1 \
              --hostname app1 \
              --restart unless-stopped \
              -p 3000:3000 \
              devopsacrregistry.azurecr.io/app:latest
          ENDSSH

      - name: Deploy app2 to VM2
        run: |
          ssh -i ~/.ssh/vm2_key azureuser@${{ secrets.VM2_HOST }} << 'ENDSSH'
            docker login devopsacrregistry.azurecr.io \
              -u ${{ secrets.ACR_USERNAME }} \
              -p ${{ secrets.ACR_PASSWORD }}
            docker pull devopsacrregistry.azurecr.io/app:latest
            docker stop app2 || true
            docker rm app2 || true
            docker run -d \
              --name app2 \
              --hostname app2 \
              --restart unless-stopped \
              -p 3000:3000 \
              devopsacrregistry.azurecr.io/app:latest
          ENDSSH

      - name: Verify deployment
        run: |
          sleep 15
          curl -f http://${{ secrets.LB_HOST }} || exit 1
          echo "Application is live at http://${{ secrets.LB_HOST }}"
